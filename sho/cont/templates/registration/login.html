{% extends "cont\base.html" %}

{% block content %}

<h2>Login</h2>
{% if request.GET.next %}
<p><strong>You must log in to access that page.</strong></p>
{% endif %}
<form method="post">
    {% csrf_token %}
    
    {{ form.as_p }}

    <button type="submit">Login</button>
</form>

<p>
Don't have an account?
<a href="{% url 'signup' %}">Register here</a>
</p>

{% endblock %}
